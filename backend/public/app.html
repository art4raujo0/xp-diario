<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Diario - Painel</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f6f8fb; margin: 0; }
    .layout { min-height: 100vh; display: flex; }
    .sidebar { width: 260px; background: #ffffff; border-right: 1px solid #e9ecef; padding: 24px 16px; }
    .brand { font-weight: 700; color: #2f2f41; margin-bottom: 20px; font-size: 1.2rem; }
    .menu-link { display: block; padding: 10px 14px; border-radius: 10px; text-decoration: none; color: #2f2f41; margin-bottom: 8px; }
    .menu-link:hover { background: #f0ecff; color: #583cd3; }
    .content { flex: 1; padding: 32px; }
    .canvas { min-height: 360px; border: 2px dashed #dee2e6; border-radius: 16px; background: #fff; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">XP Diario</div>
      <a class="menu-link" href="/metas">Metas</a>
      <a class="menu-link" href="/materias">Materias</a>
    </aside>
    <main class="content">
      <h2 class="mb-3">Painel</h2>
      <p class="text-muted">Selecione uma opcao no menu lateral para comecar.</p>
      <div class="canvas"></div>
    </main>
  </div>
</body>
</html>
