<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Diário - Matérias</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f6f8fb; margin: 0; }
    .layout { min-height: 100vh; display: flex; }
    .sidebar { width: 260px; background: #ffffff; border-right: 1px solid #e9ecef; padding: 24px 16px; }
    .brand { font-weight: 700; color: #2f2f41; margin-bottom: 20px; font-size: 1.2rem; }
    .menu-link { display: block; padding: 10px 14px; border-radius: 10px; text-decoration: none; color: #2f2f41; margin-bottom: 8px; }
    .menu-link:hover { background: #f0ecff; color: #583cd3; }
    .menu-link.active { background: #6a49f2; color: #fff; }
    .content { flex: 1; padding: 32px; }
    .card-panel { background: #fff; border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .cor-preview { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #ddd; display: inline-block; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">XP Diário</div>
      <a class="menu-link" href="/metas">Metas</a>
      <a class="menu-link active" href="/materias">Matérias</a>
    </aside>

    <main class="content">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Matérias</h2>
        <button id="btnCriarTopo" class="btn btn-primary" onclick="mostrarForm()">Cadastrar Matéria</button>
      </div>

      <div id="mensagem" class="mb-3"></div>

      <div id="formMateria" class="card card-panel p-4 mb-4 d-none">
        <input type="hidden" id="materiaId">

        <div class="mb-2">
          <label class="form-label">Nome da matéria</label>
          <input id="nome" class="form-control" maxlength="100" placeholder="Ex: Matemática">
        </div>

        <div class="mb-2">
          <label class="form-label">Dificuldade</label>
          <select id="dificuldade" class="form-control">
            <option value="">Selecione</option>
            <option value="facil">Fácil</option>
            <option value="media">Média</option>
            <option value="dificil">Difícil</option>
          </select>
        </div>

        <div class="mb-2">
          <label class="form-label">Descrição</label>
          <textarea id="descricao" class="form-control" rows="3" maxlength="250"></textarea>
        </div>

        <div class="mb-2">
          <label class="form-label">Cor</label>
          <input id="cor" type="color" class="form-control form-control-color" value="#6a49f2" title="Escolha a cor">
        </div>

        <button class="btn btn-success mt-3" onclick="salvarMateria()">Salvar</button>
        <button class="btn btn-secondary mt-2" onclick="cancelar()">Cancelar</button>
      </div>

      <div id="lista" class="card card-panel p-3"></div>
    </main>
  </div>

<script>
const API_MATERIAS = '/api/materias';

function exibirMensagem(texto, tipo) {
  const div = document.getElementById('mensagem');
  div.className = `alert alert-${tipo}`;
  div.textContent = texto;
}

function limparMensagem() {
  const div = document.getElementById('mensagem');
  div.className = '';
  div.textContent = '';
}

function mostrarForm() {
  limparMensagem();
  document.getElementById('formMateria').classList.remove('d-none');
}

function cancelar() {
  limparForm();
  document.getElementById('formMateria').classList.add('d-none');
}

function limparForm() {
  document.getElementById('materiaId').value = '';
  document.getElementById('nome').value = '';
  document.getElementById('dificuldade').value = '';
  document.getElementById('descricao').value = '';
  document.getElementById('cor').value = '#6a49f2';
}

async function carregarMaterias() {
  try {
    const res = await fetch(API_MATERIAS);
    const materias = await res.json();

    const lista = document.getElementById('lista');

    if (!Array.isArray(materias) || materias.length === 0) {
      lista.innerHTML = `
        <div class="alert alert-info mb-0">
          Nenhuma matéria cadastrada.<br><br>
          <button class="btn btn-primary" onclick="mostrarForm()">Cadastrar Matéria</button>
        </div>
      `;
      return;
    }

    lista.innerHTML = `
      <table class="table table-striped mb-0">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Dificuldade</th>
            <th>Descrição</th>
            <th>Cor</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          ${materias.map(m => `
            <tr>
              <td>${m.di_disciplina || ''}</td>
              <td>${m.di_dificuldade || ''}</td>
              <td>${m.di_descricao || ''}</td>
              <td><span class="cor-preview" style="background:${m.di_cor || '#ffffff'}"></span></td>
              <td>
                <button class="btn btn-warning btn-sm" onclick='editar(${JSON.stringify(m)})'>Editar</button>
                <button class="btn btn-danger btn-sm" onclick='deletar(${m.di_id})'>Excluir</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (error) {
    console.error(error);
    exibirMensagem('Erro ao carregar matérias.', 'danger');
  }
}

async function salvarMateria() {
  try {
    limparMensagem();

    const id = document.getElementById('materiaId').value;
    const nome = document.getElementById('nome').value.trim();
    const dificuldade = document.getElementById('dificuldade').value;
    const descricao = document.getElementById('descricao').value.trim();
    const cor = document.getElementById('cor').value;

    if (!nome) {
      exibirMensagem('Nome da matéria é obrigatório.', 'danger');
      return;
    }

    const existentesRes = await fetch(API_MATERIAS);
    const existentes = await existentesRes.json();
    const duplicada = (existentes || []).some(item => {
      if (id && Number(item.di_id) === Number(id)) return false;
      return (item.di_disciplina || '').trim().toLowerCase() === nome.toLowerCase();
    });

    if (duplicada) {
      exibirMensagem('Matéria já cadastrada.', 'danger');
      return;
    }

    const payload = {
      di_disciplina: nome,
      di_dificuldade: dificuldade,
      di_descricao: descricao,
      di_cor: cor
    };

    const resposta = await fetch(id ? `${API_MATERIAS}/${id}` : API_MATERIAS, {
      method: id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const dados = await resposta.json();

    if (!resposta.ok) {
      exibirMensagem(dados.erro || 'Erro ao salvar matéria.', 'danger');
      return;
    }

    exibirMensagem(id ? 'Matéria atualizada com sucesso.' : 'Matéria cadastrada com sucesso.', 'success');
    cancelar();
    await carregarMaterias();
  } catch (error) {
    console.error(error);
    exibirMensagem('Erro ao salvar matéria.', 'danger');
  }
}

function editar(materia) {
  mostrarForm();
  document.getElementById('materiaId').value = materia.di_id;
  document.getElementById('nome').value = materia.di_disciplina || '';
  document.getElementById('dificuldade').value = materia.di_dificuldade || '';
  document.getElementById('descricao').value = materia.di_descricao || '';
  document.getElementById('cor').value = materia.di_cor || '#6a49f2';
}

async function deletar(id) {
  if (!confirm('Deseja excluir esta matéria?')) return;

  await fetch(`${API_MATERIAS}/${id}`, { method: 'DELETE' });
  exibirMensagem('Matéria excluída com sucesso.', 'success');
  await carregarMaterias();
}

carregarMaterias();
</script>
</body>
</html>
