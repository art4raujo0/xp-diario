<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Diário - Matérias</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #f6f8fb; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .layout { min-height: 100vh; display: flex; }
    .sidebar { width: 260px; background: #ffffff; border-right: 1px solid #e9ecef; padding: 24px 16px; position: sticky; top: 0; height: 100vh; }
    .brand { font-weight: 700; color: #2f2f41; margin-bottom: 30px; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
    .brand i { color: #6a49f2; }
    .menu-link { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px; text-decoration: none; color: #2f2f41; margin-bottom: 8px; font-weight: 500;}
    .menu-link:hover, .menu-link.active { background: #f0ecff; color: #583cd3; font-weight: 700; }
    .content { flex: 1; padding: 32px; }
    .card-panel { background: #fff; border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .cor-preview { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #ddd; display: inline-block; vertical-align: middle; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><i class="fas fa-graduation-cap"></i> XP Diário</div>
      <a class="menu-link" href="/app"><i class="fas fa-th-large"></i> Dashboard</a>
      <a class="menu-link" href="/metas"><i class="fas fa-bullseye"></i> Metas</a>
      <a class="menu-link active" href="/materias"><i class="fas fa-book"></i> Matérias</a>
    </aside>

    <main class="content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark m-0">Matérias</h2>
        <button id="btnCriarTopo" class="btn btn-primary px-4" style="border-radius: 8px;" onclick="mostrarForm()">
          <i class="fas fa-plus me-2"></i>Cadastrar Matéria
        </button>
      </div>

      <div id="mensagem" class="mb-3"></div>

      <div id="formMateria" class="card card-panel p-4 mb-4 d-none">
        <h5 class="fw-bold mb-3">Dados da Matéria</h5>
        <input type="hidden" id="materiaId">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Nome da matéria</label>
            <input id="nome" class="form-control" maxlength="100" placeholder="Ex: Matemática">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Dificuldade</label>
            <select id="dificuldade" class="form-select">
              <option value="">Selecione</option>
              <option value="facil">Fácil</option>
              <option value="media">Média</option>
              <option value="dificil">Difícil</option>
            </select>
          </div>
          <div class="col-md-9 mb-3">
            <label class="form-label fw-semibold">Descrição</label>
            <textarea id="descricao" class="form-control" rows="2" maxlength="250"></textarea>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label fw-semibold">Cor</label>
            <input id="cor" type="color" class="form-control form-control-color w-100" value="#6a49f2">
          </div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-success px-4" onclick="salvarMateria()">Salvar</button>
          <button class="btn btn-light px-4" onclick="cancelar()">Cancelar</button>
        </div>
      </div>

      <div id="lista" class="card card-panel p-3"></div>
    </main>
  </div>

<script>
// Mantive seu script original exatamente igual, apenas mudei o layout da tabela para o novo estilo
const API_MATERIAS = '/api/materias';

function exibirMensagem(texto, tipo) {
  const div = document.getElementById('mensagem');
  div.className = `alert alert-${tipo} border-0 shadow-sm`;
  div.textContent = texto;
}

function limparMensagem() {
  const div = document.getElementById('mensagem');
  div.className = '';
  div.textContent = '';
}

function mostrarForm() {
  limparMensagem();
  document.getElementById('formMateria').classList.remove('d-none');
}

function cancelar() {
  limparForm();
  document.getElementById('formMateria').classList.add('d-none');
}

function limparForm() {
  document.getElementById('materiaId').value = '';
  document.getElementById('nome').value = '';
  document.getElementById('dificuldade').value = '';
  document.getElementById('descricao').value = '';
  document.getElementById('cor').value = '#6a49f2';
}

async function carregarMaterias() {
  try {
    const res = await fetch(API_MATERIAS);
    const materias = await res.json();
    const lista = document.getElementById('lista');

    if (!Array.isArray(materias) || materias.length === 0) {
      lista.innerHTML = `<div class="p-4 text-center text-muted">Nenhuma matéria cadastrada.</div>`;
      return;
    }

    lista.innerHTML = `
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Nome</th>
              <th>Dificuldade</th>
              <th>Descrição</th>
              <th class="text-center">Cor</th>
              <th class="text-end">Ações</th>
            </tr>
          </thead>
          <tbody>
            ${materias.map(m => `
              <tr>
                <td class="fw-bold">${m.di_disciplina || ''}</td>
                <td><span class="badge rounded-pill bg-light text-dark border">${m.di_dificuldade || ''}</span></td>
                <td class="text-muted small">${m.di_descricao || ''}</td>
                <td class="text-center"><span class="cor-preview" style="background:${m.di_cor || '#ffffff'}"></span></td>
                <td class="text-end">
                  <button class="btn btn-outline-warning btn-sm border-0" onclick='editar(${JSON.stringify(m)})'><i class="fas fa-edit"></i></button>
                  <button class="btn btn-outline-danger btn-sm border-0" onclick='deletar(${m.di_id})'><i class="fas fa-trash"></i></button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch (error) {
    console.error(error);
    exibirMensagem('Erro ao carregar matérias.', 'danger');
  }
}

async function salvarMateria() {
  try {
    limparMensagem();
    const id = document.getElementById('materiaId').value;
    const nome = document.getElementById('nome').value.trim();
    const dificuldade = document.getElementById('dificuldade').value;
    const descricao = document.getElementById('descricao').value.trim();
    const cor = document.getElementById('cor').value;

    if (!nome) {
      exibirMensagem('Nome da matéria é obrigatório.', 'danger');
      return;
    }

    const payload = { di_disciplina: nome, di_dificuldade: dificuldade, di_descricao: descricao, di_cor: cor };

    const resposta = await fetch(id ? `${API_MATERIAS}/${id}` : API_MATERIAS, {
      method: id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!resposta.ok) {
      const dados = await resposta.json();
      exibirMensagem(dados.erro || 'Erro ao salvar matéria.', 'danger');
      return;
    }

    exibirMensagem(id ? 'Matéria atualizada!' : 'Matéria cadastrada!', 'success');
    cancelar();
    await carregarMaterias();
  } catch (error) {
    exibirMensagem('Erro ao salvar matéria.', 'danger');
  }
}

function editar(materia) {
  mostrarForm();
  document.getElementById('materiaId').value = materia.di_id;
  document.getElementById('nome').value = materia.di_disciplina || '';
  document.getElementById('dificuldade').value = materia.di_dificuldade || '';
  document.getElementById('descricao').value = materia.di_descricao || '';
  document.getElementById('cor').value = materia.di_cor || '#6a49f2';
}

async function deletar(id) {
  if (!confirm('Deseja excluir esta matéria?')) return;
  await fetch(`${API_MATERIAS}/${id}`, { method: 'DELETE' });
  await carregarMaterias();
}

carregarMaterias();
</script>
</body>
</html>
