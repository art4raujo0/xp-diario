<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Diário - Registrar Estudo</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #f6f8fb; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .layout { min-height: 100vh; display: flex; }
    .sidebar { width: 260px; background: #ffffff; border-right: 1px solid #e9ecef; padding: 24px 16px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .brand { font-weight: 700; color: #2f2f41; margin-bottom: 30px; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
    .brand i { color: #6a49f2; }
    .menu-link { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px; text-decoration: none; color: #2f2f41; margin-bottom: 8px; font-weight: 500; }
    .menu-link:hover, .menu-link.active { background: #f0ecff; color: #583cd3; font-weight: 700; }
    .content { flex: 1; padding: 32px; overflow-y: auto; }
    .card-panel { background: #fff; border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .btn-primary { background-color: #6a49f2 !important; border-color: #6a49f2 !important; }
    .btn-primary:hover { background-color: #583cd3 !important; border-color: #583cd3 !important; }
    .xp-badge { display: inline-flex; align-items: center; gap: 6px; background: #f0ecff; color: #583cd3; border-radius: 20px; padding: 4px 12px; font-size: 0.82rem; font-weight: 700; }
    .conquista-badge { display: inline-flex; align-items: center; gap: 6px; background: #fff8e1; color: #f59e0b; border: 1px solid #fde68a; border-radius: 20px; padding: 4px 12px; font-size: 0.82rem; font-weight: 700; }
    .table thead th { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.4px; color: #6c757d; font-weight: 600; border-bottom: 1px solid #e9ecef; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #6a49f2; display: inline-block; margin-right: 6px; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><i class="fas fa-graduation-cap"></i> XP Diário</div>
      <a class="menu-link" href="/app"><i class="fas fa-th-large"></i> Dashboard</a>
      <a class="menu-link" href="/metas"><i class="fas fa-bullseye"></i> Metas</a>
      <a class="menu-link" href="/materias"><i class="fas fa-book"></i> Matérias</a>
      <a class="menu-link active" href="/estudos"><i class="fas fa-clock"></i> Registrar Estudo</a>
    </aside>

    <main class="content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold text-dark m-0">Registrar Estudo</h2>
          <p class="text-muted mb-0 mt-1" style="font-size: 0.9rem;">Registre suas sessões e acompanhe seu progresso</p>
        </div>
        <button class="btn btn-primary px-4" onclick="mostrarForm()">
          <i class="fas fa-plus me-2"></i>Novo Registro
        </button>
      </div>

      <div id="mensagem" class="mb-3"></div>

      <!-- Formulário de novo registro -->
      <div id="formEstudo" class="card card-panel p-4 mb-4 d-none">
        <h5 class="fw-bold mb-4" style="color: #2f2f41;">
          <i class="fas fa-pen-to-square me-2" style="color: #6a49f2;"></i>Novo Registro de Estudo
        </h5>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label fw-semibold">Matéria <span class="text-danger">*</span></label>
            <select id="materia" class="form-select">
              <option value="">Carregando...</option>
            </select>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label fw-semibold">Tempo estudado (min) <span class="text-danger">*</span></label>
            <input id="tempo" type="number" class="form-control" placeholder="Ex: 45" min="1">
          </div>
          <div class="col-md-2 mb-3">
            <label class="form-label fw-semibold">Tarefas concluídas</label>
            <input id="tarefas" type="number" class="form-control" placeholder="0" min="0" value="0">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label fw-semibold">Data</label>
            <input id="data" type="date" class="form-control">
          </div>
          <div class="col-12 mb-3">
            <label class="form-label fw-semibold">Descrição <span class="text-muted fw-normal">(opcional)</span></label>
            <textarea id="descricao" class="form-control" rows="2" placeholder="Ex: Revisão do capítulo 3, exercícios de fixação..."></textarea>
          </div>
        </div>
        <div class="d-flex gap-2 align-items-center">
          <button class="btn btn-success px-4" onclick="salvarRegistro()">
            <i class="fas fa-floppy-disk me-2"></i>Salvar Registro
          </button>
          <button class="btn btn-light px-4" onclick="cancelar()">Cancelar</button>
          <span class="text-muted small ms-1"><span class="text-danger">*</span> campos obrigatórios</span>
        </div>
      </div>

      <!-- Tabela de histórico -->
      <div id="lista" class="card card-panel p-3">
        <div class="p-4 text-center text-muted">
          <i class="fas fa-spinner fa-spin me-2"></i>Carregando histórico...
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="estudos.js"></script>
</body>
</html>
