<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Diario - Metas</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f6f8fb; margin: 0; }
    .layout { min-height: 100vh; display: flex; }
    .sidebar { width: 260px; background: #ffffff; border-right: 1px solid #e9ecef; padding: 24px 16px; }
    .brand { font-weight: 700; color: #2f2f41; margin-bottom: 20px; font-size: 1.2rem; }
    .menu-link { display: block; padding: 10px 14px; border-radius: 10px; text-decoration: none; color: #2f2f41; margin-bottom: 8px; }
    .menu-link:hover { background: #f0ecff; color: #583cd3; }
    .menu-link.active { background: #6a49f2; color: #fff; }
    .content { flex: 1; padding: 32px; }
    .card-panel { background: #fff; border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">XP Diario</div>
      <a class="menu-link active" href="/metas">Metas</a>
      <a class="menu-link" href="/materias">Materias</a>
    </aside>

    <main class="content">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Metas</h2>
        <button id="btnCriarTopo" class="btn btn-primary" onclick="mostrarForm()">Criar Meta</button>
      </div>

      <div id="formMeta" class="card card-panel p-4 mb-4 d-none">
        <input type="hidden" id="metaId">

        <div class="mb-2">
          <label class="form-label">Tipo</label>
          <select id="tipo" class="form-control">
            <option value="diaria">Diaria</option>
            <option value="semanal">Semanal</option>
            <option value="mensal">Mensal</option>
          </select>
        </div>

        <div class="mb-2">
          <label class="form-label">Tempo (minutos)</label>
          <input id="tempo" type="number" class="form-control">
        </div>

        <div class="mb-2">
          <label class="form-label">Disciplina</label>
          <select id="disciplina" class="form-control"></select>
        </div>

        <div class="mb-2">
          <label class="form-label">Data</label>
          <input id="data" type="date" class="form-control">
        </div>

        <button class="btn btn-success mt-3" onclick="salvarMeta()">Salvar</button>
        <button class="btn btn-secondary mt-2" onclick="cancelar()">Cancelar</button>
      </div>

      <div id="lista" class="card card-panel p-3"></div>
    </main>
  </div>

<script>
const API_METAS = "/api/metas";
const API_DISC = "/api/materias";

async function carregarDisciplinas() {
  try {
    const res = await fetch(API_DISC);
    const disciplinas = await res.json();

    const select = document.getElementById("disciplina");
    select.innerHTML = "";

    disciplinas.forEach(d => {
      select.innerHTML += `<option value="${d.di_id}">${d.di_disciplina}</option>`;
    });
  } catch (err) {
    console.error("Erro ao carregar disciplinas", err);
  }
}

async function carregarMetas() {
  try {
    const res = await fetch(API_METAS);
    const metas = await res.json();

    const lista = document.getElementById("lista");
    const botaoTopo = document.getElementById("btnCriarTopo");

    if (!Array.isArray(metas) || metas.length === 0) {
      botaoTopo.classList.add("d-none");
      lista.innerHTML = `
        <div class="alert alert-info mb-0">
          Nao tem nada aqui.<br><br>
          <button class="btn btn-primary" onclick="mostrarForm()">Criar Meta</button>
        </div>
      `;
      return;
    }

    botaoTopo.classList.remove("d-none");

    lista.innerHTML = `
      <table class="table table-striped mb-0">
        <thead>
          <tr>
            <th>Tipo</th>
            <th>Tempo (min)</th>
            <th>Disciplina</th>
            <th>Data</th>
            <th>Acoes</th>
          </tr>
        </thead>
        <tbody>
          ${metas.map(meta => `
            <tr>
              <td>${meta.me_tipo}</td>
              <td>${meta.me_tempo_min} min</td>
              <td>${meta.di_disciplina || "Sem disciplina"}</td>
              <td>${formatarData(meta.me_data_inicio)}</td>
              <td>
                <button class="btn btn-warning btn-sm" onclick='editar(${JSON.stringify(meta)})'>Editar</button>
                <button class="btn btn-danger btn-sm" onclick="deletar(${meta.me_id})">Excluir</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (err) {
    console.error("Erro ao carregar metas", err);
  }
}

function formatarData(data) {
  if (!data) return '';
  return new Date(data).toLocaleDateString('pt-BR');
}

function mostrarForm() {
  document.getElementById("formMeta").classList.remove("d-none");
}

function cancelar() {
  limparForm();
  document.getElementById("formMeta").classList.add("d-none");
}

async function salvarMeta() {
  try {
    const id = document.getElementById("metaId").value;

    const meta = {
      me_tipo: document.getElementById("tipo").value,
      me_tempo_min: parseInt(document.getElementById("tempo").value),
      me_disciplina: parseInt(document.getElementById("disciplina").value),
      me_data_inicio: document.getElementById("data").value
    };

    if (id) {
      await fetch(`${API_METAS}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(meta)
      });
    } else {
      await fetch(API_METAS, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(meta)
      });
    }

    cancelar();
    carregarMetas();
  } catch (err) {
    console.error("Erro ao salvar meta", err);
  }
}

function editar(meta) {
  mostrarForm();

  document.getElementById("metaId").value = meta.me_id;
  document.getElementById("tipo").value = meta.me_tipo;
  document.getElementById("tempo").value = meta.me_tempo_min;
  document.getElementById("disciplina").value = meta.me_disciplina;
  document.getElementById("data").value = meta.me_data_inicio?.split("T")[0];
}

async function deletar(id) {
  if (!confirm("Deseja excluir essa meta?")) return;

  await fetch(`${API_METAS}/${id}`, { method: "DELETE" });
  carregarMetas();
}

function limparForm() {
  document.getElementById("metaId").value = "";
  document.getElementById("tipo").value = "diaria";
  document.getElementById("tempo").value = "";
  document.getElementById("disciplina").value = "";
  document.getElementById("data").value = "";
}

carregarDisciplinas();
carregarMetas();
</script>
</body>
</html>
