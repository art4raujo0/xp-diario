<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Diário - Metas</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #f6f8fb; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .layout { min-height: 100vh; display: flex; }
    .sidebar { width: 260px; background: #ffffff; border-right: 1px solid #e9ecef; padding: 24px 16px; position: sticky; top: 0; height: 100vh;}
    .brand { font-weight: 700; color: #2f2f41; margin-bottom: 30px; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
    .brand i { color: #6a49f2; }
    .menu-link { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px; text-decoration: none; color: #2f2f41; margin-bottom: 8px; font-weight: 500;}
    .menu-link:hover, .menu-link.active { background: #f0ecff; color: #583cd3; font-weight: 700; }
    .content { flex: 1; padding: 32px; }
    .card-panel { background: #fff; border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><i class="fas fa-graduation-cap"></i> XP Diário</div>
      <a class="menu-link" href="/app"><i class="fas fa-th-large"></i> Dashboard</a>
      <a class="menu-link active" href="/metas"><i class="fas fa-bullseye"></i> Metas</a>
      <a class="menu-link" href="/materias"><i class="fas fa-book"></i> Matérias</a>
      <a class="menu-link" href="/estudos"><i class="fas fa-clock"></i> Registrar Estudo</a>
    </aside>

    <main class="content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark m-0">Metas</h2>
        <button id="btnCriarTopo" class="btn btn-primary px-4" onclick="mostrarForm()">
          <i class="fas fa-plus me-2"></i>Criar Meta
        </button>
      </div>

      <div id="formMeta" class="card card-panel p-4 mb-4 d-none">
        <h5 class="fw-bold mb-3">Configurar Meta</h5>
        <input type="hidden" id="metaId">
        <div class="row">
          <div class="col-md-3 mb-3">
            <label class="form-label fw-semibold">Tipo</label>
            <select id="tipo" class="form-select">
              <option value="diaria">Diária</option>
              <option value="semanal">Semanal</option>
              <option value="mensal">Mensal</option>
            </select>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label fw-semibold">Tempo (minutos)</label>
            <input id="tempo" type="number" class="form-control">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label fw-semibold">Disciplina</label>
            <select id="disciplina" class="form-select"></select>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label fw-semibold">Data</label>
            <input id="data" type="date" class="form-control">
          </div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-success px-4" onclick="salvarMeta()">Salvar</button>
          <button class="btn btn-light px-4" onclick="cancelar()">Cancelar</button>
        </div>
      </div>

      <div id="lista" class="card card-panel p-3"></div>
    </main>
  </div>

<script>
const API_METAS = "/api/metas";
const API_DISC = "/api/materias";

function token() {
  return localStorage.getItem('xp_diario_token');
}

function cabecalhos() {
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token()}`
  };
}

async function carregarDisciplinas() {
  try {
    const res = await fetch(API_DISC);
    const disciplinas = await res.json();
    const select = document.getElementById("disciplina");
    select.innerHTML = disciplinas.map(d => `<option value="${d.di_id}">${d.di_disciplina}</option>`).join('');
  } catch (err) { console.error(err); }
}

async function carregarMetas() {
  try {
    const res = await fetch(API_METAS, { headers: cabecalhos() });

    if (res.status === 401) { window.location.href = '/login'; return; }

    const metas = await res.json();
    const lista = document.getElementById("lista");

    if (!Array.isArray(metas) || metas.length === 0) {
      lista.innerHTML = `<div class="p-4 text-center text-muted">Nenhuma meta configurada.</div>`;
      return;
    }

    lista.innerHTML = `
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Tipo</th>
              <th>Tempo</th>
              <th>Disciplina</th>
              <th>Data</th>
              <th class="text-end">Ações</th>
            </tr>
          </thead>
          <tbody>
            ${metas.map(meta => `
              <tr>
                <td><span class="badge bg-soft-primary text-primary border-primary border" style="background:#f0ecff">${meta.me_tipo}</span></td>
                <td class="fw-bold">${meta.me_tempo_min} min</td>
                <td>${meta.di_disciplina || "Sem disciplina"}</td>
                <td class="text-muted small">${formatarData(meta.me_data_inicio)}</td>
                <td class="text-end">
                  <button class="btn btn-outline-warning btn-sm border-0" onclick='editar(${JSON.stringify(meta)})'><i class="fas fa-edit"></i></button>
                  <button class="btn btn-outline-danger btn-sm border-0" onclick="deletar(${meta.me_id})"><i class="fas fa-trash"></i></button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch (err) { console.error(err); }
}

function formatarData(data) {
  if (!data) return '';
  return new Date(data).toLocaleDateString('pt-BR');
}

function mostrarForm() { document.getElementById("formMeta").classList.remove("d-none"); }
function cancelar() { limparForm(); document.getElementById("formMeta").classList.add("d-none"); }

async function salvarMeta() {
  const id = document.getElementById("metaId").value;
  const meta = {
    me_tipo: document.getElementById("tipo").value,
    me_tempo_min: parseInt(document.getElementById("tempo").value),
    me_disciplina: parseInt(document.getElementById("disciplina").value),
    me_data_inicio: document.getElementById("data").value
  };
  const res = await fetch(id ? `${API_METAS}/${id}` : API_METAS, {
    method: id ? "PUT" : "POST",
    headers: cabecalhos(),
    body: JSON.stringify(meta)
  });
  if (res.status === 401) { window.location.href = '/login'; return; }
  cancelar(); carregarMetas();
}

function editar(meta) {
  mostrarForm();
  document.getElementById("metaId").value = meta.me_id;
  document.getElementById("tipo").value = meta.me_tipo;
  document.getElementById("tempo").value = meta.me_tempo_min;
  document.getElementById("disciplina").value = meta.me_disciplina;
  document.getElementById("data").value = meta.me_data_inicio?.split("T")[0];
}

async function deletar(id) {
  if (confirm("Deseja excluir essa meta?")) {
    const res = await fetch(`${API_METAS}/${id}`, { method: "DELETE", headers: cabecalhos() });
    if (res.status === 401) { window.location.href = '/login'; return; }
    carregarMetas();
  }
}

function limparForm() {
  document.getElementById("metaId").value = "";
  document.getElementById("tipo").value = "diaria";
  document.getElementById("tempo").value = "";
  document.getElementById("data").value = "";
}

if (!token()) { window.location.href = '/login'; } else { carregarDisciplinas(); carregarMetas(); }
</script>
</body>
</html>
