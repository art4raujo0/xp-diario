<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Diário - Matérias</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="layout">
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar">
      <a class="brand" href="/app">
        <div class="brand-icon"><i class="fas fa-graduation-cap"></i></div>
        <div>
          <div class="brand-name">XP Diário</div>
          <div class="brand-sub">Estudo Inteligente</div>
        </div>
      </a>
      <nav class="sidebar-nav">
        <a class="menu-link" href="/app"><i class="fas fa-th-large"></i> Dashboard</a>
        <a class="menu-link" href="/metas"><i class="fas fa-bullseye"></i> Metas</a>
        <a class="menu-link active" href="/materias"><i class="fas fa-book"></i> Matérias</a>
        <a class="menu-link" href="/tarefas"><i class="fas fa-list-check"></i> Tarefas</a>
        <a class="menu-link" href="/estudos"><i class="fas fa-clock"></i> Registrar Estudo</a>
        <a class="menu-link" href="/cronogramas"><i class="fas fa-calendar-days"></i> Cronogramas</a>
        <a class="menu-link" href="/relatorio"><i class="fas fa-chart-bar"></i> Relatório</a>
        <a class="menu-link" href="/turmas"><i class="fas fa-users"></i> Turmas</a>
        <a class="menu-link" href="/conquistas"><i class="fas fa-trophy"></i> Conquistas</a>
        <a class="menu-link" href="/perfil"><i class="fas fa-user"></i> Perfil</a>
      </nav>
      <div class="ctx-switcher" onclick="abrirContexto()" title="Trocar contexto">
        <div class="ctx-icon" id="ctx-icon"><i class="fas fa-user"></i></div>
        <div class="ctx-info">
          <div class="ctx-nome" id="ctx-nome">Minha Área</div>
          <div class="ctx-sub">Contexto atual</div>
        </div>
        <i class="fas fa-right-left ctx-switch-icon"></i>
      </div>
      <div class="sidebar-mascot">
        <div class="sidebar-mascot-char">🧙</div>
        <div class="sidebar-mascot-label">+XP a cada estudo!</div>
      </div>
      <div class="sidebar-footer">
        <a class="menu-link logout" href="#" onclick="sair(event)"><i class="fas fa-sign-out-alt"></i> Sair</a>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <span class="topbar-brand">XP Diário</span>
      </div>

      <div class="page-header">
        <div>
          <h2>📚 Matérias</h2>
          <p class="page-subtitle">Suas disciplinas de estudo</p>
        </div>
        <button class="btn btn-primary px-4" onclick="mostrarForm()">
          <i class="fas fa-plus me-2"></i>Nova Matéria
        </button>
      </div>

      <div id="mensagem" class="mb-3"></div>

      <div id="formMateria" class="card-panel p-4 mb-4 d-none">
        <h6 class="fw-bold mb-4" style="color:var(--text-dark);">Dados da Matéria</h6>
        <input type="hidden" id="materiaId">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nome da matéria</label>
            <input id="nome" class="form-control" maxlength="100" placeholder="Ex: Matemática">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Dificuldade</label>
            <select id="dificuldade" class="form-select">
              <option value="">Selecione</option>
              <option value="facil">Fácil</option>
              <option value="media">Média</option>
              <option value="dificil">Difícil</option>
            </select>
          </div>
          <div class="col-md-9 mb-3">
            <label class="form-label">Descrição</label>
            <textarea id="descricao" class="form-control" rows="2" maxlength="250"></textarea>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Cor</label>
            <input id="cor" type="color" class="form-control form-control-color w-100" value="#463acb">
          </div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-success px-4" onclick="salvarMateria()">
            <i class="fas fa-floppy-disk me-2"></i>Salvar
          </button>
          <button class="btn btn-light px-4" onclick="cancelar()">Cancelar</button>
        </div>
      </div>

      <div id="lista"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/utils.js"></script>
  <script src="/context.js"></script>
  <script>
    const API_MATERIAS = '/api/materias';

    function token() { return localStorage.getItem('xp_diario_token'); }
    function cabecalhos(semContentType) {
      const h = { 'Authorization': `Bearer ${token()}` };
      if (!semContentType) h['Content-Type'] = 'application/json';
      return h;
    }

    function difBadgeClass(dif) {
      if (dif === 'facil')   return 'diff-facil';
      if (dif === 'media')   return 'diff-media';
      if (dif === 'dificil') return 'diff-dificil';
      return 'diff-default';
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function exibirMensagem(texto, tipo) {
      const div = document.getElementById('mensagem');
      div.className = `alert alert-${tipo}`;
      div.textContent = texto;
    }

    function limparMensagem() {
      const div = document.getElementById('mensagem');
      div.className = ''; div.textContent = '';
    }

    function mostrarForm() { limparMensagem(); document.getElementById('formMateria').classList.remove('d-none'); }
    function cancelar() { limparForm(); document.getElementById('formMateria').classList.add('d-none'); }

    function limparForm() {
      document.getElementById('materiaId').value = '';
      document.getElementById('nome').value = '';
      document.getElementById('dificuldade').value = '';
      document.getElementById('descricao').value = '';
      document.getElementById('cor').value = '#463acb';
    }

    async function carregarMaterias() {
      try {
        const res = await fetch(API_MATERIAS, { headers: cabecalhos(true) });
        const materias = await res.json();
        const lista = document.getElementById('lista');

        if (!Array.isArray(materias) || materias.length === 0) {
          lista.innerHTML = `
            <div class="card-panel p-5 text-center text-muted">
              <i class="fas fa-book fs-2 mb-3 d-block" style="color:#d1c4e9;"></i>
              <p class="mb-0">Nenhuma matéria cadastrada ainda.</p>
            </div>`;
          return;
        }

        lista.innerHTML = `<div class="row g-3">
          ${materias.map(m => {
            const cor = m.di_cor || '#463acb';
            return `
              <div class="col-sm-6 col-md-4 col-lg-3">
                <div class="disc-card">
                  <div class="disc-card-header">
                    <div class="disc-icon" style="background:${hexToRgba(cor,0.12)};color:${cor};">
                      <i class="fas fa-book-open"></i>
                    </div>
                    <div class="disc-actions">
                      <button class="btn-icon" title="Editar" onclick='editar(${JSON.stringify(m)})'><i class="fas fa-pen"></i></button>
                      <button class="btn-icon danger" title="Excluir" onclick='deletar(${m.di_id})'><i class="fas fa-trash"></i></button>
                    </div>
                  </div>
                  <div class="disc-name">${m.di_disciplina || ''}</div>
                  <div class="disc-desc">${m.di_descricao || ''}</div>
                  <span class="diff-badge ${difBadgeClass(m.di_dificuldade)}">${m.di_dificuldade || ''}</span>
                  <div class="disc-bar" style="background:${cor};"></div>
                </div>
              </div>`;
          }).join('')}
        </div>`;
      } catch (error) {
        console.error(error);
        exibirMensagem('Erro ao carregar matérias.', 'danger');
      }
    }

    async function salvarMateria() {
      try {
        limparMensagem();
        const id = document.getElementById('materiaId').value;
        const nome = document.getElementById('nome').value.trim();
        const dificuldade = document.getElementById('dificuldade').value;
        const descricao = document.getElementById('descricao').value.trim();
        const cor = document.getElementById('cor').value;

        if (!nome) { exibirMensagem('Nome da matéria é obrigatório.', 'danger'); return; }

        const payload = { di_disciplina: nome, di_dificuldade: dificuldade, di_descricao: descricao, di_cor: cor };
        const resposta = await fetch(id ? `${API_MATERIAS}/${id}` : API_MATERIAS, {
          method: id ? 'PUT' : 'POST',
          headers: cabecalhos(),
          body: JSON.stringify(payload)
        });

        if (!resposta.ok) {
          const dados = await resposta.json();
          exibirMensagem(dados.erro || 'Erro ao salvar matéria.', 'danger');
          return;
        }

        exibirMensagem(id ? 'Matéria atualizada!' : 'Matéria cadastrada!', 'success');
        cancelar();
        await carregarMaterias();
      } catch (error) {
        exibirMensagem('Erro ao salvar matéria.', 'danger');
      }
    }

    function editar(materia) {
      mostrarForm();
      document.getElementById('materiaId').value = materia.di_id;
      document.getElementById('nome').value = materia.di_disciplina || '';
      document.getElementById('dificuldade').value = materia.di_dificuldade || '';
      document.getElementById('descricao').value = materia.di_descricao || '';
      document.getElementById('cor').value = materia.di_cor || '#463acb';
    }

    async function deletar(id) {
      if (!confirm('Deseja excluir esta matéria?')) return;
      await fetch(`${API_MATERIAS}/${id}`, { method: 'DELETE', headers: cabecalhos(true) });
      await carregarMaterias();
    }

    carregarMaterias();
  </script>
</body>
</html>
