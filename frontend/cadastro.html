<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XP Diário - Criar Conta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #F6F8FB;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 2rem 0;
        }
        .card-login {
            border: none;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            background-color: #FFFFFF;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .brand-logo i {
            color: #6366f1;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .brand-name {
            color: #2F2F41;
            font-weight: bold;
            font-size: 1.5rem;
            margin-bottom: 0.2rem;
        }
        .brand-tagline {
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .login-title {
            color: #2F2F41;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }
        .form-label {
            text-align: left;
            display: block;
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }
        .form-control {
            border-radius: 50px;
            padding: 0.8rem 1.2rem;
            border: 1px solid #ced4da;
            margin-bottom: 1rem;
        }
        .form-control:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 0.2rem rgba(106, 73, 242, 0.1);
        }
        .form-control.is-invalid {
            border-color: #dc3545;
            border-radius: 50px;
        }
        .btn-primary {
            background-color: #6366f1 !important;
            border-color: #6366f1 !important;
            border-radius: 50px;
            padding: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
            border: none;
        }
        .btn-primary:hover {
            background-color: #4f46e5 !important;
            border-color: #4f46e5 !important;
        }
        .btn-primary:disabled {
            background-color: #a892f8 !important;
            border-color: #a892f8 !important;
            cursor: not-allowed;
        }
        .footer-link {
            color: #6366f1;
            text-decoration: none;
            font-weight: bold;
        }
        .footer-link:hover {
            color: #4f46e5;
            text-decoration: underline;
        }
        .input-wrapper {
            position: relative;
        }
        .toggle-senha {
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6c757d;
            background: none;
            border: none;
            padding: 0;
            margin-bottom: 1rem;
        }
        .toggle-senha:hover {
            color: #2F2F41;
        }
    </style>
</head>
<body>

    <div class="card card-login">
        <div class="brand-logo"><i class="fas fa-graduation-cap"></i></div>
        <div class="brand-name">XP Diário</div>
        <div class="brand-tagline">Estudo Inteligente</div>

        <h4 class="login-title">Criar Conta</h4>

        <form id="form-cadastro">
            <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome" placeholder="Seu nome completo" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
            </div>

            <div class="mb-3">
                <label for="senha" class="form-label">Senha</label>
                <div class="input-wrapper">
                    <input type="password" class="form-control" id="senha" placeholder="Mínimo 6 caracteres" required>
                    <button type="button" class="toggle-senha" onclick="toggleSenha('senha', this)" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <label for="confirmarSenha" class="form-label">Confirmar Senha</label>
                <div class="input-wrapper">
                    <input type="password" class="form-control" id="confirmarSenha" placeholder="Repita a senha" required>
                    <button type="button" class="toggle-senha" onclick="toggleSenha('confirmarSenha', this)" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="btn-cadastrar">Criar Conta</button>

            <p class="small text-muted mb-0">Já tem uma conta? <a href="/login" class="footer-link">Entrar</a></p>
        </form>

        <div id="mensagem" class="mt-3 small"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="cadastro.js"></script>
</body>
</html>
