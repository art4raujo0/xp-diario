<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Diário - Registrar Estudo</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .xp-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #ede9fe; color: #7c3aed;
      border-radius: 99px; padding: 4px 12px;
      font-size: 0.8rem; font-weight: 700;
    }
    .conquista-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #fff8e1; color: #f59e0b;
      border: 1px solid #fde68a; border-radius: 99px;
      padding: 4px 12px; font-size: 0.8rem; font-weight: 700;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #463acb; display: inline-block; margin-right: 6px; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar">
      <a class="brand" href="/app">
        <div class="brand-icon"><i class="fas fa-graduation-cap"></i></div>
        <div>
          <div class="brand-name">XP Diário</div>
          <div class="brand-sub">Estudo Inteligente</div>
        </div>
      </a>
      <nav class="sidebar-nav">
        <a class="menu-link" href="/app"><i class="fas fa-th-large"></i> Dashboard</a>
        <a class="menu-link" href="/metas"><i class="fas fa-bullseye"></i> Metas</a>
        <a class="menu-link" href="/materias"><i class="fas fa-book"></i> Matérias</a>
        <a class="menu-link active" href="/estudos"><i class="fas fa-clock"></i> Registrar Estudo</a>
      </nav>
      <div class="sidebar-footer">
        <a class="menu-link logout" href="#" onclick="sair(event)"><i class="fas fa-sign-out-alt"></i> Sair</a>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <span class="topbar-brand">XP Diário</span>
      </div>
      <div class="page-header">
        <div>
          <h2>Registrar Estudo</h2>
          <p class="page-subtitle">Registre suas sessões e acompanhe seu progresso</p>
        </div>
        <button class="btn btn-primary px-4" onclick="mostrarForm()">
          <i class="fas fa-plus me-2"></i>Nova Sessão
        </button>
      </div>

      <div id="mensagem" class="mb-3"></div>

      <div id="formEstudo" class="card-panel p-4 mb-4 d-none">
        <h6 class="fw-bold mb-4" style="color:#1e293b;">Nova Sessão de Estudo</h6>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Matéria <span class="text-danger">*</span></label>
            <select id="materia" class="form-select">
              <option value="">Carregando...</option>
            </select>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Tempo (min) <span class="text-danger">*</span></label>
            <input id="tempo" type="number" class="form-control" placeholder="Ex: 45" min="1">
          </div>
          <div class="col-md-2 mb-3">
            <label class="form-label">Tarefas concluídas</label>
            <input id="tarefas" type="number" class="form-control" placeholder="0" min="0" value="0">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Data</label>
            <input id="data" type="date" class="form-control">
          </div>
          <div class="col-12 mb-3">
            <label class="form-label">Descrição <span class="text-muted fw-normal" style="font-size:0.8rem;">(opcional)</span></label>
            <textarea id="descricao" class="form-control" rows="2" placeholder="Ex: Revisão do capítulo 3..."></textarea>
          </div>
        </div>
        <div class="d-flex gap-2 align-items-center">
          <button class="btn btn-success px-4" onclick="salvarRegistro()">
            <i class="fas fa-floppy-disk me-2"></i>Salvar Sessão
          </button>
          <button class="btn btn-light px-4" onclick="cancelar()">Cancelar</button>
          <span class="text-muted ms-1" style="font-size:0.8rem;"><span class="text-danger">*</span> obrigatórios</span>
        </div>
      </div>

      <div id="lista" class="card-panel p-3">
        <div class="p-4 text-center text-muted">
          <i class="fas fa-spinner fa-spin me-2"></i>Carregando histórico...
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/utils.js"></script>
  <script src="estudos.js"></script>
</body>
</html>
