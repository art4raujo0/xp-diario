<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XP Diário - Login</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome para ícones -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #F6F8FB; /* Fundo cinza claro igual ao painel */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card-login {
            border: none;
            border-radius: 20px; /* Bordas bem arredondadas */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* Sombra suave */
            background-color: #FFFFFF;
            padding: 2.5rem; /* Mais espaçamento interno */
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .brand-logo i {
            color: #6A49F2; /* Roxo principal */
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .brand-name {
            color: #2F2F41; /* Texto escuro */
            font-weight: bold;
            font-size: 1.5rem;
            margin-bottom: 0.2rem;
        }
        .brand-tagline {
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .login-title {
            color: #2F2F41;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }
        .form-label {
            text-align: left;
            display: block;
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }
        .form-control {
            border-radius: 50px; /* Inputs ovais */
            padding: 0.8rem 1.2rem;
            border: 1px solid #ced4da;
            margin-bottom: 1rem;
        }
        .form-control:focus {
            border-color: #6A49F2;
            box-shadow: 0 0 0 0.2rem rgba(106, 73, 242, 0.1);
        }
        .btn-primary {
            background-color: #6A49F2 !important; /* Roxo principal */
            border-color: #6A49F2 !important;
            border-radius: 50px; /* Botão oval */
            padding: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
            border: none;
        }
        .btn-primary:hover {
            background-color: #583cd3 !important; /* Roxo um pouco mais escuro no hover */
            border-color: #583cd3 !important;
        }
        .footer-link {
            color: #6A49F2;
            text-decoration: none;
            font-weight: bold;
        }
        .footer-link:hover {
            color: #583cd3;
            text-decoration: underline;
        }
        .small-link {
            color: #6c757d;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .small-link:hover {
            color: #2F2F41;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card card-login">
        <!-- Seção da Marca -->
        <div class="brand-logo"><i class="fas fa-graduation-cap"></i></div>
        <div class="brand-name">XP Diário</div>
        <div class="brand-tagline">Estudo Inteligente</div>

        <h4 class="login-title">Acesso ao Sistema</h4>

        <form id="form-login">
            <!-- Campo de E-mail -->
            <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
            </div>

            <!-- Campo de Senha -->
            <div class="mb-3">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" class="form-control" id="senha" placeholder="••••••" required>
            </div>

            <!-- Links Extras -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="lembrarMe">
                    <label class="form-check-label small-link" for="lembrarMe">Lembre-se</label>
                </div>
                <a href="#" class="small-link">Esqueceu a senha?</a>
            </div>

            <!-- Botão Entrar -->
            <button type="submit" class="btn btn-primary w-100">Entrar</button>

            <!-- Rodapé -->
            <p class="small text-muted mb-0">Não tem uma conta? <a href="#" class="footer-link">Cadastre-se</a></p>
        </form>

        <!-- Div para mensagens de erro/sucesso (usada pelo login.js) -->
        <div id="mensagem" class="mt-3 small"></div>
    </div>

    <!-- Bootstrap Bundle JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Seu arquivo JS de login para a lógica -->
    <script src="login.js"></script>
</body>
</html>
