<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Di&aacute;rio - Perfil</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="layout">
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar">
      <a class="brand" href="/app"><div class="brand-icon"></div><div><div class="brand-name">XP<br><span class="brand-purple">Di&aacute;rio</span></div><div class="brand-sub">Estudo em aventura</div></div></a>
      <nav class="sidebar-nav">
        <a class="menu-link" href="/app"><i class="fas fa-house"></i> Dashboard</a>
        <a class="menu-link" href="/materias"><i class="fas fa-book-open"></i> Disciplinas</a>
        <a class="menu-link" href="/cronogramas"><i class="fas fa-calendar-days"></i> Cronograma</a>
        <a class="menu-link" href="/tarefas"><i class="fas fa-clipboard-check"></i> Tarefas</a>
        <a class="menu-link" href="/metas"><i class="fas fa-bullseye"></i> Metas</a>
        <a class="menu-link" href="/estudos"><i class="fas fa-clock"></i> Sess&otilde;es</a>
        <a class="menu-link" href="/relatorio"><i class="fas fa-chart-column"></i> Relat&oacute;rios</a>
        <a class="menu-link active" href="/perfil"><i class="fas fa-user"></i> Perfil</a>
      </nav>
      <div class="ctx-switcher" onclick="abrirContexto()" title="Trocar contexto"><div class="ctx-icon" id="ctx-icon"><i class="fas fa-user"></i></div><div class="ctx-info"><div class="ctx-nome" id="ctx-nome">Minha &Aacute;rea</div><div class="ctx-sub">Contexto atual</div></div><i class="fas fa-right-left ctx-switch-icon"></i></div>
      <div class="sidebar-footer"><a class="menu-link logout" href="#" onclick="sair(event)"><i class="fas fa-right-from-bracket"></i> Sair</a></div>
    </aside>

    <main class="content">
      <div class="topbar"><button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button><span class="topbar-brand fw-black">XP Di&aacute;rio</span></div>
      <div class="app-topbar">
        <div class="flex-grow-1">
          <h2 class="mb-0 fw-black">Perfil</h2>
          <p class="page-subtitle">Sua pontua&ccedil;&atilde;o e progresso geral.</p>
        </div>
        <div class="user-chip"><div class="avatar-sprite"></div><div><div class="fw-black lh-1" data-user-name>Estudante</div><small class="text-muted fw-bold" data-user-level>N&iacute;vel 1</small></div></div>
      </div>
      <div id="conteudo"><div class="card-panel p-5 text-center text-muted"><i class="fas fa-spinner fa-spin me-2"></i>Carregando perfil...</div></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/utils.js"></script>
  <script src="/context.js"></script>
  <script src="/perfil.js"></script>
</body>
</html>
