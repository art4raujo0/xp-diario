<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Diário - Entrar</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .auth-layout{min-height:100vh;display:flex;}
    .auth-left{width:45%;background:linear-gradient(135deg,#1a1032 0%,#4338ca 50%,#7c3aed 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 40px;color:#fff;position:relative;overflow:hidden;}
    .auth-left::before{content:'';position:absolute;top:-80px;right:-60px;width:280px;height:280px;background:rgba(255,255,255,0.05);border-radius:50%;pointer-events:none;}
    .auth-left::after{content:'';position:absolute;bottom:-100px;left:-60px;width:240px;height:240px;background:rgba(255,255,255,0.04);border-radius:50%;pointer-events:none;}
    .auth-brand{text-align:center;margin-bottom:28px;z-index:1;}
    .auth-brand-icon{font-size:3.2rem;margin-bottom:10px;line-height:1;}
    .auth-brand-title{font-size:1.75rem;font-weight:800;margin:0 0 8px;}
    .auth-brand-sub{opacity:.75;font-size:.875rem;margin:0;max-width:240px;}
    .auth-mascot{font-size:4.5rem;line-height:1;margin:12px 0 24px;z-index:1;filter:drop-shadow(0 8px 16px rgba(0,0,0,.3));}
    .auth-features{z-index:1;width:100%;max-width:260px;}
    .auth-feature{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:.875rem;opacity:.88;border-bottom:1px solid rgba(255,255,255,.1);}
    .auth-feature:last-child{border-bottom:none;}
    .auth-right{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 32px;background:#f4f5ff;}
    .auth-form-wrap{width:100%;max-width:400px;}
    .auth-logo{display:flex;align-items:center;gap:8px;font-size:1.05rem;font-weight:700;color:#5b5ef4;text-decoration:none;margin-bottom:24px;}
    .auth-logo span{font-size:1.3rem;}
    .auth-form-wrap h2{font-size:1.5rem;font-weight:700;color:#1e293b;margin:0 0 5px;}
    .auth-subtitle{color:#64748b;font-size:.875rem;margin:0 0 22px;}
    .input-icon-wrap{position:relative;}
    .input-icon-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:.82rem;pointer-events:none;z-index:2;}
    .input-icon-wrap .form-control{padding-left:36px;}
    .auth-switch{text-align:center;color:#64748b;font-size:.875rem;margin-top:18px;margin-bottom:0;}
    .auth-switch a{color:#5b5ef4;font-weight:600;text-decoration:none;}
    .auth-switch a:hover{text-decoration:underline;}
    @media(max-width:767px){.auth-left{width:100%;padding:24px;min-height:auto;}.auth-mascot{font-size:3rem;margin:8px 0 12px;}.auth-features{display:none;}.auth-right{padding:20px 16px;align-items:flex-start;}}
  </style>
</head>
<body>

  <div class="auth-layout">

    <!-- LEFT PANEL -->
    <div class="auth-left">
      <div class="auth-brand">
        <div class="auth-brand-icon">🎓</div>
        <h1 class="auth-brand-title">XP Diário</h1>
        <p class="auth-brand-sub">Transforme seus estudos em uma aventura épica</p>
      </div>

      <div class="auth-mascot">🧙</div>

      <div class="auth-features">
        <div class="auth-feature"><span>⚔️</span> Ganhe XP por sessão</div>
        <div class="auth-feature"><span>🔥</span> Mantenha sua sequência</div>
        <div class="auth-feature"><span>🏆</span> Desbloqueie conquistas</div>
        <div class="auth-feature"><span>📊</span> Acompanhe seu progresso</div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-right">
      <div class="auth-form-wrap">

        <a href="/app" class="auth-logo">
          <span>🎓</span> XP Diário
        </a>

        <h2>Bem-vindo de volta!</h2>
        <p class="auth-subtitle">Entre na sua conta para continuar sua jornada</p>

        <form id="form-login">

          <div class="mb-3">
            <label for="email" class="form-label small fw-semibold text-secondary">E-mail</label>
            <div class="input-icon-wrap">
              <i class="fas fa-envelope"></i>
              <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
            </div>
          </div>

          <div class="mb-4">
            <label for="senha" class="form-label small fw-semibold text-secondary">Senha</label>
            <div class="input-icon-wrap">
              <i class="fas fa-lock"></i>
              <input type="password" class="form-control" id="senha" placeholder="Sua senha" required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">Entrar</button>

          <p class="auth-switch">Ainda não tem conta? <a href="/cadastro">Criar conta</a></p>

        </form>

        <div id="mensagem" class="mt-3 small"></div>

      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/login.js"></script>
</body>
</html>
